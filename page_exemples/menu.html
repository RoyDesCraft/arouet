  <script>
    /** https://abdessalam.dev/blog/detect-device-type-javascript/*/
    const getDeviceType = () => {
      const ua = navigator.userAgent
      if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) {
        return "tablet"
      }
      if (
        /Mobile|iP(hone|od)|Android|BlackBerry|IEMobile|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(
          ua,
        )
      ) {
        return "mobile"
      }
      return "desktop"
    }

    /** this might not always be correct. Logic from https://github.com/straxico/use-detect-keyboard-open */
    const listener = () => {
      const MIN_KEYBOARD_HEIGHT = 300
      const isMobile = getDeviceType() === "mobile"
      const isKeyboardOpen =
        isMobile && window.screen.height - MIN_KEYBOARD_HEIGHT > window.visualViewport.height
      const amwDiv = document.getElementById("amw")
      if (amwDiv) {
        amwDiv.style.visibility = isKeyboardOpen ? "hidden" : "visible"
        amwDiv.style.display = isKeyboardOpen ? "none" : "block"
      }
    }
    window.addEventListener("resize", listener)
  </script>
